name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.38.5
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: tooling/supabase/package-lock.json

      - name: Install dependencies
        run: ./scripts/bootstrap.sh

      - name: Verify repository gate
        run: ./scripts/verify.sh

  migrations:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: tooling/supabase/package-lock.json

      - name: Install Supabase tooling dependencies
        run: npm ci --prefix tooling/supabase

      - name: Migration lint
        run: ./scripts/check-migrations.sh
