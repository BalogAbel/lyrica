name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  flutter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.38.5
          cache: true

      - name: Install dependencies
        run: flutter pub get
        working-directory: apps/lyrica_app

      - name: Format check
        run: dart format --output=none --set-exit-if-changed lib test
        working-directory: apps/lyrica_app

      - name: Analyze
        run: flutter analyze
        working-directory: apps/lyrica_app

      - name: Test
        run: flutter test
        working-directory: apps/lyrica_app

  migrations:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.67.1

      - name: Migration lint
        run: ./scripts/check-migrations.sh
